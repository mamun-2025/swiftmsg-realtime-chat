
name: SwiftMsg CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # আপনার মেইন ব্রাঞ্চের নাম অনুযায়ী পরিবর্তন করতে পারেন

jobs:
  test:
    runs-on: ubuntu-latest
    
    # ব্যাকগ্রাউন্ডে রেডিস চালু করা (যেহেতু আপনি Upstash/Redis ব্যবহার করছেন)
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: কোড চেকআউট করা
        uses: actions/checkout@v4

      - name: পাইথন সেটআপ করা
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: লাইব্রেরি ইনস্টল করা
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-asyncio

      - name: Pytest রান করা
        env:
          SECRET_KEY: "test-secret-key"
          DEBUG: "True"
  
          DB_URL: "sqlite:///:memory:" 
        run: |
          pytest

  deploy:
    needs: test 
    runs-on: ubuntu-latest
    steps:
      - name: Render এ ডিপ্লয়মেন্ট রিকোয়েস্ট পাঠানো
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"